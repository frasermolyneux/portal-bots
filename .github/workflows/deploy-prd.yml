name: Deploy Prd

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 3"

permissions: {}

concurrency:
  group: ${{ github.workflow }}

jobs:
  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - id: changes
        uses: frasermolyneux/actions/detect-changes@main
        with:
          filters: |
            src:src/**
            terraform:terraform/**

  terraform-plan-and-apply-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - if: needs.detect-changes.outputs.terraform != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  terraform-plan-and-apply-prd:
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - terraform-plan-and-apply-dev
    if: |
      !failure() && !cancelled() && (needs.terraform-plan-and-apply-dev.result == 'success' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - if: needs.detect-changes.outputs.terraform != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  deploy-to-vm:
    needs:
      - terraform-plan-and-apply-prd
    runs-on: [self-hosted, windows]
    permissions:
      contents: read
      id-token: write
    environment: Production
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        shell: pwsh
        run: |
          cd terraform
          terraform init -backend-config="backends/prd.backend.hcl"
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: "true"
          ARM_USE_OIDC: "true"

      - name: Extract terraform outputs
        id: terraform-output
        shell: pwsh
        run: |
          cd terraform
          $outputs = terraform output -json | ConvertFrom-Json

          $clientAppSecret = $outputs.client_app_secret.value
          $mysqlConnectionString = $outputs.mysql_connection_string.value

          Write-Output "::add-mask::$clientAppSecret"
          Write-Output "::add-mask::$mysqlConnectionString"

          echo "CLIENT_APP_ID=$($outputs.client_app_id.value)" >> $env:GITHUB_ENV
          echo "CLIENT_APP_SECRET=$clientAppSecret" >> $env:GITHUB_ENV
          echo "REPOSITORY_API_AUDIENCE=$($outputs.repository_api_audience.value)" >> $env:GITHUB_ENV
          echo "EVENT_INGEST_API_AUDIENCE=$($outputs.event_ingest_api_audience.value)" >> $env:GITHUB_ENV
          echo "MYSQL_CONNECTION_STRING=$mysqlConnectionString" >> $env:GITHUB_ENV
          echo "REPOSITORY_API_BASE_URL=$($outputs.repository_api_base_url.value)" >> $env:GITHUB_ENV
          echo "EVENT_INGEST_API_BASE_URL=$($outputs.event_ingest_api_base_url.value)" >> $env:GITHUB_ENV
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: "true"
          ARM_USE_OIDC: "true"

      - name: Deploy bot environment
        shell: pwsh
        run: |
          $params = @{
            sourceWorkingDirectory         = "${{ github.workspace }}"
            environment                    = "prd"
            clientAppId                    = "$env:CLIENT_APP_ID"
            clientAppSecret                = "$env:CLIENT_APP_SECRET"
            repositoryApplicationAudience  = "$env:REPOSITORY_API_AUDIENCE"
            eventIngestApplicationAudience = "$env:EVENT_INGEST_API_AUDIENCE"
            mysqlConnectionString          = "$env:MYSQL_CONNECTION_STRING"
            repositoryApiBaseUrl           = "$env:REPOSITORY_API_BASE_URL"
            eventIngestApiBaseUrl          = "$env:EVENT_INGEST_API_BASE_URL"
          }

          & "scripts/Deploy-BotEnvironment.ps1" @params
